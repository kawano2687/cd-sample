apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: <USER>-stg
  namespace: openshift-gitops
spec:
  description: stg environment of health system
  destinations:
  - namespace: <USER>-staging
    server: https://kubernetes.default.svc
  sourceRepos:
  - http://<GITEA_HOSTNAME>/gitea/cd-practice.git
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'

