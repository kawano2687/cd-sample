apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: <USER>-app-production
  namespace: openshift-gitops
  labels:
    app: node-build-config-openshift
    environment: prod
spec:
  destination:
    namespace: <USER>-production
    server: https://kubernetes.default.svc
  project: <USER>-prod
  source:
    kustomize:
    path: cd-practice/deploy/overlays/prod
    repoURL: http://<GITEA_HOSTNAME>/gitea/cd-practice.git
    targetRevision: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true 
      - CreateNamespace=true
